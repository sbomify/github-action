---
name: Generate License Databases

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      distros:
        description: 'Distros to generate (comma-separated, or "all")'
        required: false
        default: 'all'

jobs:
  generate-databases:
    name: Generate License Databases
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Alpine versions (APK)
          - distro: alpine
            version: "3.13"
          - distro: alpine
            version: "3.14"
          - distro: alpine
            version: "3.15"
          - distro: alpine
            version: "3.16"
          - distro: alpine
            version: "3.17"
          - distro: alpine
            version: "3.18"
          - distro: alpine
            version: "3.19"
          - distro: alpine
            version: "3.20"
          - distro: alpine
            version: "3.21"
          # Wolfi (rolling release)
          - distro: wolfi
            version: "rolling"
          # Amazon Linux (RPM)
          - distro: amazonlinux
            version: "2"
          - distro: amazonlinux
            version: "2023"
          # CentOS Stream (RPM)
          - distro: centos
            version: "stream8"
          - distro: centos
            version: "stream9"
          # Rocky Linux (RPM)
          - distro: rocky
            version: "8"
          - distro: rocky
            version: "9"
          # AlmaLinux (RPM)
          - distro: almalinux
            version: "8"
          - distro: almalinux
            version: "9"
          # Fedora (RPM)
          - distro: fedora
            version: "39"
          - distro: fedora
            version: "40"
          - distro: fedora
            version: "41"
          - distro: fedora
            version: "42"
          # Ubuntu (DEB) - these take longer
          - distro: ubuntu
            version: "20.04"
          - distro: ubuntu
            version: "22.04"
          - distro: ubuntu
            version: "24.04"
          # Debian (DEB)
          - distro: debian
            version: "11"
          - distro: debian
            version: "12"
          - distro: debian
            version: "13"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract tool versions
        run: |
          source ./scripts/generate_additional_packages.sh
          echo "UV_VERSION=$UV_VERSION" >> "$GITHUB_ENV"

      - name: Install UV
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "${{ env.UV_VERSION }}"

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate ${{ matrix.distro }}-${{ matrix.version }} database
        run: |
          uv run sbomify-license-db \
            --distro ${{ matrix.distro }} \
            --version ${{ matrix.version }} \
            --output ${{ matrix.distro }}-${{ matrix.version }}.json.gz

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: license-db-${{ matrix.distro }}-${{ matrix.version }}
          path: ${{ matrix.distro }}-${{ matrix.version }}.json.gz
          retention-days: 7

      - name: Get release tag
        id: get_tag
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${GH_EVENT_NAME}" = "release" ]; then
            echo "tag=${GH_RELEASE_TAG}" >> $GITHUB_OUTPUT
          else
            # For workflow_dispatch, get the latest release tag
            LATEST_TAG=$(curl -s "https://api.github.com/repos/${GH_REPOSITORY}/releases/latest" | jq -r .tag_name)
            echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          fi
          echo "Uploading to release: $(cat $GITHUB_OUTPUT | grep tag | cut -d= -f2)"

      - name: Upload to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: ${{ matrix.distro }}-${{ matrix.version }}.json.gz
          tag_name: ${{ steps.get_tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
